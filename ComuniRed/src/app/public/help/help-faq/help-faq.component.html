<div class="faq-wrapper">
  <div class="faq-list">
    @for (faq of faqs; track faq.id) {
      <div class="faq-item">
        <button
          type="button"
          class="faq-question"
          (click)="toggleFAQ(faq)"
          [class.expanded]="faq.expanded"
        >
          <span>{{ faq.question }}</span>
          <span class="faq-icon">{{ faq.expanded ? '−' : '+' }}</span>
        </button>

        @if (faq.expanded) {
          <div class="faq-answer">{{ faq.answer }}</div>
        }
      </div>
    }
  </div>
</div>
