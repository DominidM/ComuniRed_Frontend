<div class="ch-overlay" (click)="cerrar()">
  <button class="ch-close-btn" (click)="cerrar()" title="Cerrar">
    <i class="bi bi-x-lg"></i>
  </button>
  <div class="ch-panel" (click)="$event.stopPropagation()" (drop)="onDrop($event)" (dragover)="onDragOver($event)">

    <!-- ─── PREVIEW (flex: 1, ocupa todo el espacio disponible) ─── -->
    <div class="ch-preview" [style.background]="previewUrl ? '#000' : colorFondo">
      <div class="ch-header-overlay">
        <div class="ch-user">
          <img [src]="user?.avatarUrl" class="ch-avatar" />
          <div class="ch-user-info">
            <span class="ch-name">{{ user?.name || 'Usuario' }}</span>
            <span class="ch-time">ahora</span>
          </div>
        </div>
        <div class="ch-controls">
          <div class="ch-volume">
            <button class="ch-vol-btn" (click)="toggleMute()" [title]="muted ? 'Activar sonido' : 'Silenciar'">
              <i [class]="muted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill'"></i>
            </button>
            <input type="range" min="0" max="1" step="0.05"
                   [(ngModel)]="volumen" (input)="onVolumeChange()"
                   class="ch-vol-slider" />
          </div>
          <button class="ch-action-btn" (click)="togglePlayPause()" [title]="pausado ? 'Reproducir' : 'Pausar'">
            <i [class]="pausado ? 'bi bi-play-fill' : 'bi bi-pause-fill'"></i>
          </button>
          <button class="ch-action-btn" (click)="toggleBusquedaMusica(); $event.stopPropagation()" title="Añadir música">
            <i class="bi bi-music-note-beamed"></i>
          </button>
          <button class="ch-action-btn" (click)="cerrar()" title="Cerrar">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>

      <img *ngIf="previewUrl && !esVideo" [src]="previewUrl" class="ch-preview-media" />
      <video *ngIf="previewUrl && esVideo" [src]="previewUrl" class="ch-preview-media" muted autoplay loop playsinline></video>
      <div *ngIf="texto && !previewUrl" class="ch-preview-texto">{{ texto }}</div>

      <div *ngIf="pistaSeleccionada" class="ch-music-widget" (click)="toggleMusicaPreview(); $event.stopPropagation()">
        <div class="ch-music-cover-wrap">
          <img [src]="pistaSeleccionada.coverUrl" class="ch-music-cover" [class.ch-music-spinning]="musicaSonando" />
          <div class="ch-music-play-overlay" *ngIf="!musicaSonando">
            <i class="bi bi-play-fill"></i>
          </div>
        </div>
        <div class="ch-music-info">
          <span class="ch-music-title">{{ pistaSeleccionada.title }}</span>
          <span class="ch-music-artist">{{ pistaSeleccionada.artist }}</span>
        </div>
        <div class="ch-music-status">
          <i [class]="musicaSonando ? 'bi bi-music-note-beamed' : 'bi bi-play-circle'"></i>
        </div>
      </div>
    </div>

    <!-- ─── TOOLS: colores | imagen | tiempo ─── -->
    <div class="ch-tools-row" *ngIf="mostrarTools">
      <div class="ch-colors-section">
        <div class="ch-color-row" *ngIf="!previewUrl">
          <button *ngFor="let bg of opcionesColor" class="ch-color-swatch" [style.background]="bg" [class.seleccionado]="colorFondo === bg" (click)="colorFondo = bg; iniciarPreview()" type="button"></button>
        </div>
      </div>
      <div class="ch-right-section">
        <input type="file" #inputArchivo accept="image/jpeg,image/png,image/webp,video/mp4,video/quicktime" (change)="onArchivoSeleccionado($event)" class="ch-hidden-input" />
        <button class="ch-tool-btn ch-btn-image" (click)="inputArchivo.click()" title="Imagen o video">
          <i class="bi bi-image"></i>
        </button>
        <button *ngIf="pistaSeleccionada" class="ch-tool-btn ch-tool-btn-danger ch-remove-music" (click)="eliminarPista(); $event.stopPropagation()" title="Quitar música">
          <i class="bi bi-music-note-beamed"></i>
        </button>
      </div>
      <div class="ch-duracion-section">
        <div class="ch-duracion-group">
          <button *ngFor="let d of opcionesDuracion" class="ch-dur-btn ch-dur-btn-lg" [class.seleccionado]="duracion === d.value" (click)="duracion = d.value; iniciarPreview()" type="button">{{ d.label }}</button>
        </div>
      </div>
    </div>

    <!-- ─── INPUT TEXTO ─── -->
    <div class="ch-input-section" *ngIf="!previewUrl">
      <div class="ch-input-wrap">
        <textarea [(ngModel)]="texto" class="ch-textarea" placeholder="Escribe algo..." rows="1" maxlength="150"></textarea>
        <span class="ch-contador">{{ texto.length }}/150</span>
      </div>
    </div>

    <!-- ─── BOTTOM: toggle + publicar ─── -->
    <div class="ch-bottom-fixed">
      <button class="ch-toggle-btn" (click)="toggleTools()" title="Mostrar herramientas">
        <i [class]="mostrarTools ? 'bi bi-chevron-up' : 'bi bi-chevron-down'"></i>
      </button>
      <button class="ch-publicar-btn" (click)="publicar()" [disabled]="!esValido || publicando">
        <span *ngIf="!publicando">Publicar</span>
        <div class="ch-spinner" *ngIf="publicando"></div>
      </button>
    </div>

    <!-- ─── PROGRESO / ERROR ─── -->
    <div *ngIf="publicando" class="ch-progreso-section">
      <div class="ch-progreso-barra"><div class="ch-progreso-lleno" [style.width.%]="progresoSubida"></div></div>
      <div class="ch-progreso-info">
        <span>Publicando... {{ progresoSubida | number:'1.0-0' }}%</span>
        <button class="ch-cancelar-btn" (click)="cancelarSubida()">Cancelar</button>
      </div>
    </div>
    <div *ngIf="errorSubida" class="ch-error">{{ errorSubida }}</div>

    <!-- ─── MUSIC SEARCH OVERLAY ─── -->
    <div *ngIf="mostrarBusquedaMusica" class="ch-musica-overlay">
      <div class="ch-musica-header">
        <span>Buscar música</span>
        <button class="ch-btn-icon" (click)="toggleBusquedaMusica()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="ch-musica-input-wrap">
        <i class="bi bi-search"></i>
        <input type="text" [(ngModel)]="consultaMusica" (input)="onInputMusica()" placeholder="Buscar canciones..." class="ch-musica-input" autofocus />
      </div>
      <div *ngIf="buscandoMusica" class="ch-musica-loading"><div class="ch-spinner"></div> Buscando...</div>
      <div *ngIf="!buscandoMusica && resultadosMusica.length === 0 && consultaMusica.length >= 2" class="ch-musica-vacio">Sin resultados</div>
      <div *ngIf="resultadosMusica.length > 0" class="ch-musica-resultados">
        <div *ngFor="let track of resultadosMusica" class="ch-musica-item"
          [class.ch-musica-item--selected]="pistaSeleccionada?.id === track.id"
          (click)="seleccionarPista(track)">
          <img [src]="track.coverUrl" class="ch-musica-item-portada" />
          <div class="ch-musica-item-info">
            <span class="ch-musica-item-titulo">{{ track.title }}</span>
            <span class="ch-musica-item-artista">{{ track.artist }}</span>
          </div>
          <div class="ch-musica-item-controls" (click)="$event.stopPropagation()">
            <button class="ch-music-preview-btn"
              [class.is-playing]="previewReproduciendo?.id === track.id && previewAudio && !previewAudio.paused"
              (click)="togglePreview(track, $event)"
              [disabled]="!track.previewUrl"
              aria-label="Reproducir vista previa">
              <svg *ngIf="previewReproduciendo?.id !== track.id || !previewAudio || previewAudio.paused" viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <polygon points="8,5 19,12 8,19"/>
              </svg>
              <svg *ngIf="previewReproduciendo?.id === track.id && previewAudio && !previewAudio.paused" viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <rect x="6" y="4" width="4" height="16" rx="1"/>
                <rect x="14" y="4" width="4" height="16" rx="1"/>
              </svg>
            </button>
            <div class="ch-music-preview-progress" *ngIf="previewReproduciendo?.id === track.id">
              <div class="ch-music-progress-track">
                <div class="ch-music-progress-fill" [style.width.%]="previewProgreso"></div>
              </div>
            </div>
            <button class="ch-music-mute-btn" (click)="toggleMutePreview($event)"
              *ngIf="previewReproduciendo?.id === track.id"
              aria-label="Silenciar">
              <svg *ngIf="!previewMuted" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
              </svg>
              <svg *ngIf="previewMuted" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
