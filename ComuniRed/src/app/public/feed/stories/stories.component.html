<div class="stories-container">
  <button class="scroll-btn scroll-left" *ngIf="showLeftArrow" (click)="scrollLeft()" aria-label="Anterior">
    <i class="bi bi-chevron-left"></i>
  </button>

  <div class="stories-track" #storiesTrack (scroll)="onTrackScroll()">

    <div class="story-item create-item" (click)="openCreateStory()">
      <div class="story-ring create-ring">
        <div class="create-icon">
          <i class="bi bi-plus-lg"></i>
        </div>
      </div>
      <span class="story-label">Crear</span>
    </div>

    <div *ngIf="myActiveStories" class="story-item" (click)="openStory(myActiveStories)">
      <div class="story-ring" [class.gradient-ring]="!myActiveStories.allSeen">
        <img [src]="user?.avatarUrl || 'assets/img/default-avatar.png'" [alt]="user?.name" class="story-avatar" />
      </div>
      <span class="story-label">Tu historia</span>
    </div>

    <div *ngFor="let group of storyGroups; trackBy: trackByGroupId" class="story-item" (click)="openStory(group)">
      <div class="story-ring" [class.gradient-ring]="!group.allSeen">
        <img [src]="group.userAvatar || 'assets/img/default-avatar.png'" [alt]="group.userName" class="story-avatar" />
      </div>
      <span class="story-label">{{ truncateName(group.userName) }}</span>
    </div>

    <ng-container *ngIf="loadingStories">
      <div *ngFor="let i of skeletonItems" class="story-item skeleton-item">
        <div class="story-ring"><div class="skeleton-avatar"></div></div>
        <span class="skeleton-label"></span>
      </div>
    </ng-container>
  </div>

  <button class="scroll-btn scroll-right" *ngIf="showRightArrow" (click)="scrollRight()" aria-label="Siguiente">
    <i class="bi bi-chevron-right"></i>
  </button>
</div>

<!-- Crear Historia (moddal) -->
<app-crear-historia
  *ngIf="showCreateModal"
  [user]="user"
  (close)="closeCreateModal()"
  (storyCreated)="onStoryCreated($event)">
</app-crear-historia>
