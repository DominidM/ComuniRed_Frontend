<div class="feed-container">

  <div *ngIf="showToast" class="toast-notification">{{ toastMessage }}</div>
  <div *ngIf="loading" class="loading-overlay"><div class="spinner"></div></div>

  <!-- Stories -->
  <app-stories [user]="user"
    (storyPublished)="toast('Historia publicada')">
  </app-stories>

  <!-- Crear reporte (trigger) -->
  <div class="create-card card">
    <div class="create-top">
      <div class="create-avatar">
        <img [src]="user?.avatarUrl" class="user-avatar"/>
      </div>
      <button class="create-input" (click)="showCreateModal = true">
        ¿Qué problema de infraestructura quieres reportar?
      </button>
    </div>
    <div class="create-sep"></div>
    <div class="create-actions">
      <button class="create-action" (click)="showCreateModal = true">
        <i class="bi bi-image create-icon"></i><span>Foto/Video</span>
      </button>
      <button class="create-action" (click)="showCreateModal = true">
        <i class="bi bi-geo-alt-fill create-icon"></i><span>Ubicación</span>
      </button>
    </div>
  </div>

  <!-- Modal crear reporte -->
  <app-create-report *ngIf="showCreateModal"
    [user]="user"
    [categorias]="categorias"
    (created)="onReportCreated()"
    (cancelled)="showCreateModal = false">
  </app-create-report>

  <!-- Posts -->
  <ng-container *ngIf="posts.length > 0 || loadingMore; else emptyState">
    <app-post-card
      *ngFor="let post of posts; trackBy: trackByPostId"
      [post]="post"
      [currentUser]="user"
      [showReactionMenu]="showReactionMenu[post.id]"
      [commentText]="commentTexts[post.id] || ''"
      [editingCommentId]="editingCommentId"
      [editingCommentText]="editingCommentText"
      [showCommentMenuModal]="showCommentMenuModal"
      (reactionToggled)="onReactionToggled($event)"
      (reactionMenuToggle)="onReactionMenuToggle($event)"
      (voted)="onVoted($event)"
      (commentsToggled)="onCommentsToggled($event)"
      (commentAdded)="onCommentAdded($event)"
      (commentTextChange)="onCommentTextChange(post.id, $event)"
      (openCommentsModal)="openCommentsModal($event)"
      (openHistorial)="onOpenHistorial($event)"
      (editPost)="onEditPost($event)"
      (deletePost)="onDeletePost($event)"
      (bookmarkToggled)="onBookmark($event)"
      (sharePost)="onShare($event)"
      (profileClicked)="onProfileClicked($event)"
      (startEditComment)="onStartEditComment($event)"
      (saveEditComment)="onSaveEditComment($event)"
      (cancelEditComment)="editingCommentId = null"
      (deleteComment)="onDeleteComment($event)"
      (commentMenuToggle)="onCommentMenuToggle($event)">
    </app-post-card>
  </ng-container>

  <!-- Skeleton -->
  <ng-container *ngIf="loadingMore">
    <div class="post-card skeleton-card" *ngFor="let i of skeletonItems">
      <div class="skeleton-header">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-lines">
          <div class="skeleton skeleton-line-short"></div>
          <div class="skeleton skeleton-line-tiny"></div>
        </div>
      </div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-image"></div>
    </div>
  </ng-container>

  <!-- Fin del feed -->
  <div *ngIf="allLoaded && posts.length > 0" class="end-of-feed">
    <i class="bi bi-check-circle"></i> Has visto todos los reportes
  </div>

  <!-- Empty -->
  <ng-template #emptyState>
    <div class="no-posts">
      <div class="no-posts-inner">
        <div class="no-posts-icon">🔍</div>
        <h3>No se encontraron reportes</h3>
        <p>Sé el primero en reportar un problema</p>
      </div>
    </div>
  </ng-template>

  <!-- Modal historial -->
  <app-historial *ngIf="showHistorialModal"
    [queja]="selectedQuejaHistorial"
    [eventos]="historialEventos"
    [loading]="loadingHistorial"
    (closed)="closeHistorial()">
  </app-historial>

</div>
