<div class="crud-reel-root">
  <app-workspace-header
    [title]="'Gestión de Reels'"
    [subtitle]="'Administra los reels registrados en la plataforma.'"
    [breadcrumbs]="[
      { label: 'Admin', route: '/admin/dashboard' },
      { label: 'Reels', route: '/admin/reels' }
    ]"
    [count]="filteredReels.length"
    [countLabel]="'reels'"
    [actionLabel]="'Nuevo Reel'"
    [actionIcon]="'+'"
    [loading]="loading"
    (actionClick)="crearNuevo()"
  >
  </app-workspace-header>

  <div class="crud-reel-card">
    <div class="crud-reel-controls-row">
      <div class="crud-reel-search-box">
        <input
          type="text"
          [(ngModel)]="searchText"
          (keyup.enter)="buscarReel()"
          placeholder="Buscar por título, autor o descripción..."
        />

        <button
          class="crud-reel-search-btn"
          type="button"
          (click)="buscarReel()"
          aria-label="Buscar reel"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <button
          class="crud-reel-clear-btn"
          type="button"
          (click)="limpiarBusqueda()"
          *ngIf="searchText"
        >
          Limpiar
        </button>
      </div>

      <div class="crud-reel-count">
        <span>Total: {{ filteredReels.length }} reels</span>
      </div>
    </div>

    <app-loading-overlay [loading]="loading" text="Cargando reels...">
      <app-data-table
        [columns]="columns"
        [rows]="filteredReels"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="filteredReels.length"
        [loading]="loading"
        [rowTrackBy]="trackByReelId"
        emptyMessage="No hay reels registrados."
        minWidth="1100px"
        (pageChange)="goToPage($event)"
        [showPagination]="false"
      >
        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-view" type="button" (click)="verDetalle(row)">Ver</button>
            <button class="btn-edit" type="button" (click)="editar(row)">Editar</button>
            <button class="btn-delete" type="button" (click)="eliminar(row)">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>
  </div>
</div>
