<div class="admin-page">
  <app-workspace-header title="Gestión de Categorías" subtitle="Administra las categorías de reportes" [breadcrumbs]="[{ label: 'Admin', route: '/admin/dashboard' }, { label: 'Categorías' }]" actionLabel="Nueva Categoría" (actionClick)="openAddModal()"></app-workspace-header>

    <app-admin-search
      [(searchText)]="searchText"
      placeholder="Buscar categorías..."
      [total]="totalCategorias"
      totalLabel="categorías"
      [showPageSize]="true"
      [(pageSize)]="pageSize"
      [pageSizes]="pageSizes"
      (pageSizeChange)="onPageSizeChange($event)"
      (search)="buscarCategorias()"
      (clear)="limpiarBusqueda()"
    ></app-admin-search>

    <app-loading-overlay [loading]="loading" text="Cargando categorías...">
      <app-data-table
        [columns]="columns"
        [rows]="categoriasFiltradas"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="totalCategorias"
        [loading]="loading"
        [rowTrackBy]="trackByCategoriaId"
        emptyMessage="No hay categorías registradas."
        minWidth="900px"
        (pageChange)="goToPage($event)"
      >
        <ng-template dataTableCell="activo" let-row>
          <span class="status-badge" [class.status-active]="row.activo" [class.status-inactive]="!row.activo">
            {{ row.activo ? 'Sí' : 'No' }}
          </span>
        </ng-template>

        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-edit" (click)="editarCategoria(row)" title="Editar categoría">Editar</button>
            <button class="btn-delete" (click)="eliminarCategoria(row.id)" title="Eliminar categoría">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>

    <div class="crud-rol-modal" *ngIf="showModal" (click)="closeModal()">
      <div class="crud-rol-modal-content" (click)="$event.stopPropagation()">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          {{ editingCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}
        </h3>
        <form (ngSubmit)="guardarCategoria()" #categoriaForm="ngForm">
          <div class="form-group">
            <label for="nombre">Nombre de la Categoría</label>
            <input 
              id="nombre" 
              name="nombre" 
              type="text"
              [(ngModel)]="nombre" 
              required 
              placeholder="Ej: Electrónica, Ropa, Alimentos..."
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <input 
              id="descripcion" 
              name="descripcion" 
              type="text"
              [(ngModel)]="descripcion" 
              placeholder="Describe las características de esta categoría..."
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input 
                type="checkbox" 
                name="activo" 
                [(ngModel)]="activo"
                class="checkbox-input"
              />
              <span class="checkbox-text">Categoría activa</span>
            </label>
          </div>
          <div class="crud-rol-modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
              Cancelar
            </button>
            <button type="submit" class="btn-primary" [disabled]="!categoriaForm.valid">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20,6 9,17 4,12"></polyline>
              </svg>
              {{ editingCategoria ? 'Actualizar' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
</div>
