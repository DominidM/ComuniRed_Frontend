<div class="admin-page">
  <app-workspace-header title="Gestión de Usuarios" subtitle="Administra los usuarios registrados" [breadcrumbs]="[{ label: 'Admin', route: '/admin/dashboard' }, { label: 'Usuarios' }]" actionLabel="Nuevo Usuario" (actionClick)="openAddModal()"></app-workspace-header>

    <app-admin-search
      [(searchText)]="searchText"
      placeholder="Buscar por nombre, apellido, DNI..."
      [total]="totalElements"
      totalLabel="usuarios"
      [showPageSize]="true"
      [(pageSize)]="size"
      [pageSizes]="pageSizes"
      (search)="buscarUsuario()"
      (clear)="limpiarBusqueda()"
      (pageSizeChange)="onPageSizeChange($event)"
    ></app-admin-search>

    <app-loading-overlay [loading]="loading" text="Cargando usuarios...">
      <app-data-table
        [columns]="columns"
        [rows]="usuarios"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="totalElements"
        [loading]="loading"
        [rowTrackBy]="trackByUsuarioId"
        emptyMessage="No hay usuarios registrados."
        minWidth="800px"
        (pageChange)="goToPage($event)"
      >
        <ng-template dataTableCell="nombre_completo" let-row>
          <span style="font-weight:600;">{{ row.nombre }} {{ row.apellido }}</span>
        </ng-template>

        <ng-template dataTableCell="rol_id" let-row>
          {{ getRolNombre(row.rol_id) }}
        </ng-template>

        <ng-template dataTableCell="fecha_registro" let-row>
          <ng-container *ngIf="row.fecha_registro; else sinFechaReg">
            {{ row.fecha_registro | date:'dd/MM/yyyy' }}
          </ng-container>
          <ng-template #sinFechaReg>
            <span style="color: #9ca3af;">—</span>
          </ng-template>
        </ng-template>

        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-edit" (click)="openEditModal(row)" title="Editar usuario">Editar</button>
            <button class="btn-delete" (click)="deleteUsuario(row)" title="Eliminar usuario">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>

    <div class="crud-usuario-modal" *ngIf="showModal" (click)="closeModal()">
      <div class="crud-usuario-modal-content" (click)="$event.stopPropagation()">
        <h3>{{ editingUsuario ? 'Editar Usuario' : 'Nuevo Usuario' }}</h3>

        <form (ngSubmit)="saveUsuario(usuarioForm)" #usuarioForm="ngForm">
          <div class="form-group imagen-perfil">
            <label for="foto_perfil" class="form-label">Foto de Perfil</label>
            <div class="imagen-preview">
              <img [src]="imagenPreview || usuarioData.foto_perfil || defaultFoto" alt="Foto de perfil" class="preview" />
            </div>
            <input type="file" id="foto_perfil" accept="image/*" (change)="onFileSelected($event)" class="form-control archivo-input" />
            <button *ngIf="imagenPreview || usuarioData.foto_perfil" type="button" class="btn-quitar-foto" (click)="quitarFoto()">
              Quitar foto
            </button>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre *</label>
              <input id="nombre" name="nombre" type="text" [(ngModel)]="usuarioData.nombre" required placeholder="Nombre del usuario" autocomplete="off"/>
            </div>
            <div class="form-group">
              <label for="apellido">Apellido *</label>
              <input id="apellido" name="apellido" type="text" [(ngModel)]="usuarioData.apellido" required placeholder="Apellido del usuario" autocomplete="off"/>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="dni">DNI</label>
              <input id="dni" name="dni" type="text" [(ngModel)]="usuarioData.dni" placeholder="12345678" maxlength="8" (input)="onNumericInput($event,'dni',8)"/>
            </div>
            <div class="form-group">
              <label for="numero_telefono">Teléfono</label>
              <input id="numero_telefono" name="numero_telefono" type="text" [(ngModel)]="usuarioData.numero_telefono" placeholder="987654321" maxlength="15" (input)="onTelefonoInput($event)"/>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="sexo">Sexo</label>
              <select id="sexo" name="sexo" [(ngModel)]="usuarioData.sexo">
                <option value="">Seleccionar...</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label for="distrito">Distrito</label>
              <input id="distrito" name="distrito" type="text" [(ngModel)]="usuarioData.distrito" placeholder="Ej: Miraflores" autocomplete="off"/>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="codigo_postal">Código Postal</label>
              <input id="codigo_postal" name="codigo_postal" type="text" [(ngModel)]="usuarioData.codigo_postal" placeholder="15074" maxlength="10" autocomplete="off"/>
            </div>
            <div class="form-group">
              <label for="direccion">Dirección</label>
              <input id="direccion" name="direccion" type="text" [(ngModel)]="usuarioData.direccion" placeholder="Ingrese dirección completa" autocomplete="off"/>
            </div>
          </div>
          
          <div class="form-group">
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" [(ngModel)]="usuarioData.email" required placeholder="ejemplo@correo.com"/>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="password">Contraseña {{ !editingUsuario ? '*' : '' }}</label>
              <input id="password" name="password" type="password" [(ngModel)]="usuarioData.password" [required]="!editingUsuario" placeholder="Mínimo 6 caracteres"/>
            </div>
            <div class="form-group">
              <label for="rol_id">Rol *</label>
              <select id="rol_id" name="rol_id" [(ngModel)]="usuarioData.rol_id" required>
                <option value="">Seleccionar rol...</option>
                <option *ngFor="let r of roles" [value]="r.id">{{ r.nombre }}</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label for="fecha_nacimiento">Fecha de Nacimiento</label>
            <input id="fecha_nacimiento" name="fecha_nacimiento" type="date" [(ngModel)]="usuarioData.fecha_nacimiento" [max]="hoy" />
            <small style="color: #6b7280; font-size: 0.875rem;">La edad se calcula automáticamente</small>
          </div>
          
          <div class="form-group" *ngIf="editingUsuario && usuarioData.fecha_registro">
            <label for="fecha_registro_display">Fecha de Registro</label>
            <input id="fecha_registro_display" type="text" [value]="usuarioData.fecha_registro | date:'dd/MM/yyyy HH:mm'" readonly style="background-color: #f3f4f6; cursor: not-allowed;"/>
            <small style="color: #6b7280; font-size: 0.875rem;">Este campo no se puede modificar</small>
          </div>
          
          <div class="crud-usuario-modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">Cancelar</button>
            <button type="submit" class="btn-primary" [disabled]="!usuarioForm.form.valid || saving || subiendoImagen">
              {{ subiendoImagen ? 'Subiendo imagen...' : (saving ? 'Guardando...' : (editingUsuario ? 'Actualizar' : 'Guardar')) }}
            </button>
          </div>
        </form>
      </div>
    </div>
</div>
