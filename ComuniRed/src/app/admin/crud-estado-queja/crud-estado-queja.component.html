<div class="admin-page">
  <app-workspace-header title="Gestión de Estados de Reclamo" subtitle="Administra los estados de los reclamos" [breadcrumbs]="[{ label: 'Admin', route: '/admin/dashboard' }, { label: 'Estados' }]" actionLabel="Nuevo Estado" (actionClick)="abrirModal()"></app-workspace-header>

    <app-admin-search
      [(searchText)]="searchText"
      placeholder="Buscar estados..."
      [total]="totalEstados"
      totalLabel="estados"
      [showPageSize]="true"
      [(pageSize)]="pageSize"
      [pageSizes]="pageSizes"
      (pageSizeChange)="onPageSizeChange($event)"
      (search)="buscarEstados()"
      (clear)="limpiarBusqueda()"
    ></app-admin-search>

    <app-loading-overlay [loading]="loading" text="Cargando estados...">
      <app-data-table
        [columns]="columns"
        [rows]="estadosFiltrados"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="totalEstados"
        [loading]="loading"
        [rowTrackBy]="trackByEstadoId"
        emptyMessage="No hay estados de queja registrados."
        minWidth="1000px"
        (pageChange)="goToPage($event)"
      >
        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-edit" (click)="editarEstado(row)" title="Editar estado">Editar</button>
            <button class="btn-delete" (click)="eliminarEstado(row.id)" title="Eliminar estado">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>

    <div class="crud-estado-queja-modal" *ngIf="modalVisible" (click)="cerrarModal()">
      <div class="crud-estado-queja-modal-content" (click)="$event.stopPropagation()">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          {{ modoEdicion ? 'Editar Estado de Queja' : 'Nuevo Estado de Queja' }}
        </h3>
        <form (ngSubmit)="guardarEstado()" #estadoForm="ngForm">
          <div class="form-group">
            <label for="clave">Clave</label>
            <input id="clave" name="clave" type="text" [(ngModel)]="estadoActual.clave" required placeholder="Ej: pendiente, en_proceso, resuelto..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" type="text" [(ngModel)]="estadoActual.nombre" required placeholder="Ej: Pendiente, En Proceso, Resuelto..." autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" [(ngModel)]="estadoActual.descripcion" placeholder="Describe el estado de la queja..." autocomplete="off" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="orden">Orden</label>
            <input id="orden" name="orden" type="number" [(ngModel)]="estadoActual.orden" required min="1" placeholder="Ej: 1, 2, 3..." autocomplete="off" />
          </div>
          <div class="crud-estado-queja-modal-actions">
            <button type="button" class="btn-cancel" (click)="cerrarModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
              Cancelar
            </button>
            <button type="submit" class="btn-primary" [disabled]="!estadoForm.valid">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20,6 9,17 4,12"></polyline>
              </svg>
              {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
</div>
