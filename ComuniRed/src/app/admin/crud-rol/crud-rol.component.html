<div class="admin-page">
  <app-workspace-header title="Gestión de Roles" subtitle="Administra los roles del sistema" [breadcrumbs]="[{ label: 'Admin', route: '/admin/dashboard' }, { label: 'Roles' }]" actionLabel="Nuevo Rol" (actionClick)="openAddModal()"></app-workspace-header>

    <app-admin-search
      [(searchText)]="searchText"
      placeholder="Buscar por nombre..."
      [total]="totalElements"
      totalLabel="roles"
      [showPageSize]="true"
      [(pageSize)]="size"
      [pageSizes]="pageSizes"
      (search)="buscarRol()"
      (clear)="limpiarBusqueda()"
      (pageSizeChange)="onPageSizeChange($event)"
    ></app-admin-search>

    <app-loading-overlay [loading]="loading" text="Cargando roles...">
      <app-data-table
        [columns]="columns"
        [rows]="roles"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="totalElements"
        [loading]="loading"
        [rowTrackBy]="trackByRolId"
        emptyMessage="No hay roles registrados."
        minWidth="800px"
        (pageChange)="goToPage($event)"
      >
        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-edit" (click)="openEditModal(row)" title="Editar rol">Editar</button>
            <button class="btn-delete" (click)="deleteRol(row)" title="Eliminar rol">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>

    <div class="crud-rol-modal" #modal *ngIf="showModal" (click)="closeModal()">
      <div class="crud-rol-modal-content" (click)="$event.stopPropagation()">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          {{ editingRol ? 'Editar Rol' : 'Nuevo Rol' }}
        </h3>
        
        <form (ngSubmit)="saveRol()" #rolForm="ngForm">
          <div class="form-group">
            <label for="nombre">Nombre del Rol</label>
            <input 
              id="nombre" 
              name="nombre" 
              type="text"
              [(ngModel)]="rolData.nombre" 
              required 
              placeholder="Ej: Administrador, Usuario, Moderador..."
              autocomplete="off"
            />
          </div>
          
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <input 
              id="descripcion" 
              name="descripcion" 
              type="text"
              [(ngModel)]="rolData.descripcion" 
              placeholder="Describe las responsabilidades de este rol..."
              autocomplete="off"
            />
          </div>
          
          <div class="crud-rol-modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
              Cancelar
            </button>
            <button type="submit" class="btn-primary" [disabled]="!rolForm.valid">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20,6 9,17 4,12"></polyline>
              </svg>
              {{ editingRol ? 'Actualizar' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
</div>
