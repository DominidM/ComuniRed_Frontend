<div class="admin-root">
  <app-admin-sidebar
    [isAdmin]="isAdmin"
    [isSoporte]="isSoporte"
    (exportPdfClick)="exportPdf()">
  </app-admin-sidebar>

  <div class="admin-main">
    <app-admin-navbar
      [userDisplay]="userDisplay"
      [avatarUrl]="userAvatar"
      [isDarkMode]="isDarkMode"
      [notificationCount]="notificationCount"
      (toggleThemeClick)="toggleTheme()"
      (logoutClick)="logout()"
      (notificationsClick)="goToNotifications()">
    </app-admin-navbar>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <div class="chatbot-container">
    <button
      class="chatbot-toggle"
      type="button"
      (click)="toggleChatbot()"
      [attr.aria-label]="chatbotOpen ? 'Cerrar chat' : 'Abrir chat'">
      <span *ngIf="!chatbotOpen">💬</span>
      <span *ngIf="chatbotOpen">×</span>
    </button>

    <div
      class="chatbot-window"
      [class.open]="chatbotOpen"
      role="dialog"
      aria-label="Asistente ComuniRed"
      [attr.aria-hidden]="!chatbotOpen">

      <div class="chatbot-header">
        <span>Asistente ComuniRed</span>
        <button class="chatbot-close" type="button" (click)="closeChatbot()" aria-label="Cerrar chat">
          ×
        </button>
      </div>

      <div class="chatbot-messages" #chatMessagesDiv>
        <div class="chat-message bot">
          <div class="message-avatar">🤖</div>
          <div class="message-content">
            ¡Hola! Soy tu asistente virtual. ¿En qué puedo ayudarte hoy?
          </div>
        </div>

        <div
          *ngFor="let message of chatMessages"
          class="chat-message"
          [class.user]="message.isUser"
          [class.bot]="!message.isUser">
          <div class="message-avatar">{{ message.isUser ? '👤' : '🤖' }}</div>
          <div class="message-content">{{ message.content }}</div>
        </div>
      </div>

      <div class="chatbot-input-area">
        <input
          #chatInput
          class="chatbot-input"
          type="text"
          placeholder="Escribe tu mensaje..."
          [(ngModel)]="chatMessage"
          (keyup.enter)="sendMessage()" />

        <button
          class="chatbot-send"
          type="button"
          (click)="sendMessage()"
          aria-label="Enviar mensaje">
          ➤
        </button>
      </div>
    </div>
  </div>
</div>
