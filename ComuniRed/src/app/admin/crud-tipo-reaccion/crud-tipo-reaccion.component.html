<div class="admin-page">
  <app-workspace-header title="Gestión de Tipos de Reacción" subtitle="Administra los tipos de reacción" [breadcrumbs]="[{ label: 'Admin', route: '/admin/dashboard' }, { label: 'Tipos de Reacción' }]" actionLabel="Nuevo Tipo" (actionClick)="openAddModal()"></app-workspace-header>

    <app-admin-search
      [(searchText)]="searchText"
      placeholder="Buscar tipos de reacción..."
      [total]="totalTipos"
      totalLabel="tipos"
      [showPageSize]="true"
      [(pageSize)]="pageSize"
      [pageSizes]="pageSizes"
      (pageSizeChange)="onPageSizeChange($event)"
      (search)="buscarTipos()"
      (clear)="limpiarBusqueda()"
    ></app-admin-search>

    <app-loading-overlay [loading]="loading" text="Cargando tipos de reacción...">
      <app-data-table
        [columns]="columns"
        [rows]="tiposFiltrados"
        [page]="page"
        [pages]="pages"
        [totalPages]="totalPages"
        [totalElements]="totalTipos"
        [loading]="loading"
        [rowTrackBy]="trackByTipoId"
        emptyMessage="No hay tipos de reacción registrados."
        minWidth="1000px"
        (pageChange)="goToPage($event)"
      >
        <ng-template dataTableCell="activo" let-row>
          <span class="status-badge" [class.status-active]="row.activo" [class.status-inactive]="!row.activo">
            {{ row.activo ? 'Activo' : 'Inactivo' }}
          </span>
        </ng-template>

        <ng-template dataTableCell="acciones" let-row>
          <div class="action-buttons">
            <button class="btn-edit" (click)="openEditModal(row)" title="Editar tipo">Editar</button>
            <button class="btn-delete" (click)="deleteTipo(row)" title="Eliminar tipo">Eliminar</button>
          </div>
        </ng-template>
      </app-data-table>
    </app-loading-overlay>

    <div class="crud-tipo-reaccion-modal" *ngIf="showModal" (click)="closeModal()">
      <div class="crud-tipo-reaccion-modal-content" (click)="$event.stopPropagation()">
        <h3>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
            <line x1="9" y1="9" x2="9.01" y2="9"></line>
            <line x1="15" y1="9" x2="15.01" y2="9"></line>
          </svg>
          {{ editingTipo ? 'Editar Tipo de Reacción' : 'Nuevo Tipo de Reacción' }}
        </h3>
        <form (ngSubmit)="saveTipo()" #tipoForm="ngForm">
          <div class="form-group">
            <label for="key">Clave (Key)</label>
            <input 
              id="key" 
              name="key" 
              type="text"
              [(ngModel)]="tipoData.key" 
              required 
              maxlength="50"
              autocomplete="off"
            />
            <small class="form-help">Identificador único del tipo de reacción</small>
          </div>
          <div class="form-group">
            <label for="label">Nombre (Label)</label>
            <input 
              id="label" 
              name="label" 
              type="text"
              [(ngModel)]="tipoData.label" 
              required 
              maxlength="100"
              autocomplete="off"
            />
            <small class="form-help">Nombre visible del tipo de reacción</small>
          </div>
          <div class="form-group">
            <label for="orden">Orden</label>
            <input 
              id="orden" 
              name="orden" 
              type="number"
              [(ngModel)]="tipoData.orden" 
              required 
              min="1"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input 
                type="checkbox" 
                name="activo" 
                [(ngModel)]="tipoData.activo"
                class="checkbox-input"
              />
              <span class="checkbox-text">Tipo de reacción activo</span>
            </label>
          </div>
          <div class="crud-tipo-reaccion-modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
              Cancelar
            </button>
            <button type="submit" class="btn-primary" [disabled]="!tipoForm.valid">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20,6 9,17 4,12"></polyline>
              </svg>
              {{ editingTipo ? 'Actualizar' : 'Guardar' }}
            </button>
          </div>
        </form>
      </div>
    </div>
</div>
