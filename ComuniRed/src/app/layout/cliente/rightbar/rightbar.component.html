<div class="rightbar-container">
  <!-- ── Mensajes estilo IG ── -->
  <section class="rb-section" aria-label="Mensajes directos">
    <div class="rb-section-header">
      <div class="rb-title">
        <mat-icon>chat_bubble</mat-icon>
        Mensajes
      </div>

    </div>

    <div class="msg-list">
      <div
        class="msg-item"
        *ngFor="let m of mensajes"
        (click)="onAbrirChat(m)"
        [class.unread]="m.unread"
        role="button"
        [attr.aria-label]="'Chat con ' + m.name"
      >
        <div
          class="msg-avatar"
          [style.background]="m.avatarUrl ? 'transparent' : m.color"
        >
          <img
            *ngIf="m.avatarUrl"
            [src]="m.avatarUrl"
            [alt]="m.name"
            style="
              width: 100%;
              height: 100%;
              border-radius: 50%;
              object-fit: cover;
            "
          />
          <span *ngIf="!m.avatarUrl">{{ m.initials }}</span>
          <span *ngIf="m.online" class="msg-online-dot"></span>
        </div>
        <div class="msg-body">
          <div class="msg-name">{{ m.name }}</div>
          <div class="msg-preview" [class.bold]="m.unread">{{ m.preview }}</div>
        </div>
        <div class="msg-meta">
          <span class="msg-time">{{ m.time }}</span>
          <span
            *ngIf="m.unreadCount"
            class="msg-badge"
            aria-label="{{ m.unreadCount }} mensajes nuevos"
          >
            {{ m.unreadCount }}
          </span>
        </div>
      </div>
    </div>

    <button
      class="rb-ver-todos"
      [routerLink]="['/public/messages']"
      type="button"
    >
      Ver todos los mensajes
    </button>
  </section>

  <!-- ── Sugerencias ── -->
  <section class="rb-section" aria-label="Sugerencias de usuarios">
    <div class="rb-section-header">
      <div class="rb-title">
        <mat-icon>group_add</mat-icon>
        Sugerencias
      </div>
    </div>

    <div *ngIf="loadingSugerencias" class="rb-loading">
      <mat-icon class="rb-spin">autorenew</mat-icon>
      <span>Cargando...</span>
    </div>

    <div class="sug-list" *ngIf="!loadingSugerencias">
      <div
        class="sug-item"
        *ngFor="let usuario of sugerencias"
        (click)="verPerfil(usuario)"
      >
        <img
          [src]="obtenerFoto(usuario.foto_perfil)"
          class="sug-avatar"
          alt="avatar"
          (error)="$event.target.src = 'assets/img/default-avatar.png'"
        />
        <div class="sug-info">
          <span class="sug-name">{{ usuario.nombre }} {{ usuario.apellido }}</span>
          <span class="sug-distrito" *ngIf="usuario.distrito">{{ usuario.distrito }}</span>
        </div>
        <button
          class="sug-btn"
          [class.siguiendo]="getEstado(usuario)?.estaSiguiendo"
          [class.pendiente]="getEstado(usuario)?.solicitudEnviada"
          [disabled]="estaCargando(usuario)"
          (click)="$event.stopPropagation(); toggleSeguir(usuario)"
          type="button"
        >
          <span *ngIf="estaCargando(usuario)">...</span>
          <span *ngIf="!estaCargando(usuario)">
            {{ getEstado(usuario)?.estaSiguiendo ? 'Siguiendo' : getEstado(usuario)?.solicitudEnviada ? 'Pendiente' : 'Seguir' }}
          </span>
        </button>
      </div>
      <div class="sug-empty" *ngIf="sugerencias.length === 0 && !loadingSugerencias">
        No hay sugerencias
      </div>
    </div>

    <button
      class="rb-ver-todos"
      [routerLink]="['/public/suggestions']"
      type="button"
      *ngIf="sugerencias.length > 0"
    >
      Ver más
    </button>
  </section>
</div>
