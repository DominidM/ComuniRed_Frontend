<nav
  class="cr-navbar"
  [class.modal-dimmed]="modalActive"
  [class.modal-blocked]="modalActive"
  [attr.aria-disabled]="modalActive"
>
  <div class="navbar-inner">
    <div class="navbar-left">
      <button
        class="menu-toggle-btn"
        (click)="onMenuToggle()"
        [disabled]="modalActive"
        type="button"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <a class="cr-logo" (click)="goHome()" style="cursor:pointer;">
        <img [src]="logoUrl" alt="ComuniRed" class="cr-logo__img" />
        <span class="cr-logo__text">ComuniReD</span>
      </a>
    </div>

    <div class="navbar-center">
      <div class="cr-search" [class.has-results]="showSearchResults">
        <mat-icon class="search-icon">search</mat-icon>

        <input
          type="text"
          placeholder="Buscar personas..."
          [value]="query"
          (input)="onQueryChange($event)"
          (keyup.escape)="closeSearch()"
          [disabled]="modalActive"
          autocomplete="off"
        />

        <mat-icon class="search-spinner" *ngIf="searching">autorenew</mat-icon>
      </div>

      <div
        class="search-dropdown"
        *ngIf="showSearchResults && searchResults.length > 0 && !modalActive"
      >
        <div
          class="search-item"
          *ngFor="let user of searchResults; trackBy: trackByResult"
          (click)="selectResult(user)"
        >
          <div class="search-item-icon">
            <img
              [src]="obtenerFoto(user.foto_perfil)"
              class="search-avatar"
              alt="avatar"
            />
          </div>

          <div class="search-item-info">
            <span class="search-item-title">{{ getResultName(user) }}</span>
            <span class="search-item-sub" *ngIf="user.distrito">{{ user.distrito }}</span>
          </div>
        </div>
      </div>

      <div
        class="search-dropdown search-empty"
        *ngIf="showSearchResults && !searching && searchResults.length === 0 && !modalActive"
      >
        <mat-icon>search_off</mat-icon>
        <span>Sin resultados para "{{ query }}"</span>
      </div>
    </div>

    <div class="navbar-right">
      <button
        class="nav-icon-btn"
        matTooltip="Notificaciones"
        (click)="openNotifications()"
        [disabled]="modalActive"
        type="button"
      >
        <mat-icon>notifications_none</mat-icon>
        <span class="nav-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
      </button>

      <button
        class="nav-icon-btn"
        matTooltip="Mensajes"
        (click)="goMessages()"
        [disabled]="modalActive"
        type="button"
      >
        <mat-icon>chat_bubble_outline</mat-icon>
      </button>

      <button
        class="nav-icon-btn"
        matTooltip="Cambiar tema"
        (click)="toggleTheme()"
        [disabled]="modalActive"
        type="button"
      >
        <mat-icon>{{ themeService.isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button
        class="nav-avatar"
        (click)="goProfile()"
        matTooltip="Mi perfil"
        [disabled]="modalActive"
        type="button"
      >
        <img
          *ngIf="avatarUrl"
          [src]="avatarUrl"
          class="nav-avatar-img"
          alt="avatar"
        />
        <span *ngIf="!avatarUrl" class="nav-avatar-fallback">{{ initials }}</span>
      </button>
    </div>
  </div>
</nav>

<div
  class="search-backdrop"
  *ngIf="showSearchResults && !modalActive"
  (click)="closeSearch()"
></div>

<div class="modal-overlay" *ngIf="showUserModal && selectedUser" (click)="closeUserModal()">
  <div class="user-modal" (click)="$event.stopPropagation()">
    <button class="modal-close-btn" (click)="closeUserModal()" type="button">
      <mat-icon>close</mat-icon>
    </button>

    <div class="modal-avatar-wrapper">
      <img
        [src]="obtenerFoto(selectedUser.foto_perfil)"
        class="modal-avatar"
        alt="avatar"
      />
    </div>

    <h2 class="modal-name">{{ selectedUser.nombre }} {{ selectedUser.apellido }}</h2>

    <div class="modal-details">
      <div class="modal-detail" *ngIf="selectedUser.email">
        <mat-icon>email</mat-icon>
        <span>{{ selectedUser.email }}</span>
      </div>
      <div class="modal-detail" *ngIf="selectedUser.distrito">
        <mat-icon>location_on</mat-icon>
        <span>{{ selectedUser.distrito }}</span>
      </div>
      <div class="modal-detail" *ngIf="calcularEdad(selectedUser.fecha_nacimiento) as edad">
        <mat-icon>calendar_today</mat-icon>
        <span>{{ edad }} años</span>
      </div>
    </div>

    <button class="modal-profile-btn" (click)="goToProfile()" type="button">
      <mat-icon>person</mat-icon>
      Ver perfil completo
    </button>
  </div>
</div>
