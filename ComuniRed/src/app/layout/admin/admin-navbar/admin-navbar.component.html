<header class="admin-navbar">
  <div class="navbar-left"></div>

  <div class="admin-user-info">
    <!-- Notificaciones -->
    <button
      class="admin-icon-btn"
      type="button"
      (click)="onNotifications()"
      aria-label="Notificaciones"
      title="Notificaciones"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="admin-badge" *ngIf="notificationCount > 0">{{ notificationCount > 99 ? '99+' : notificationCount }}</span>
    </button>

    <!-- Accesibilidad -->
    <div style="position:relative;">
      <button
        class="admin-icon-btn"
        type="button"
        (click)="toggleAcc()"
        aria-label="Accesibilidad"
        title="Accesibilidad"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <path d="M12 10v8"/>
          <path d="M8 14h8"/>
        </svg>
      </button>

      <div class="acc-dropdown" *ngIf="accOpen" (click)="$event.stopPropagation()">
        <div class="acc-dropdown-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/>
            <path d="M12 10v8"/><path d="M8 14h8"/>
          </svg>
          Accesibilidad
        </div>
        <div class="acc-dropdown-body">
          <div class="acc-row">
            <span class="acc-label">Tamaño de letra</span>
            <div class="acc-btns">
              <button (click)="decreaseText()" type="button" class="acc-btn" title="Disminuir">A−</button>
              <button (click)="resetText()" type="button" class="acc-btn" title="Restablecer">A</button>
              <button (click)="increaseText()" type="button" class="acc-btn" title="Aumentar">A+</button>
            </div>
          </div>
          <div class="acc-row">
            <span class="acc-label">Alto contraste</span>
            <button (click)="toggleHighContrast()" [class.active]="isHighContrast" type="button" class="acc-btn acc-btn--toggle">
              {{ isHighContrast ? 'Desactivar' : 'Activar' }}
            </button>
          </div>
          <div class="acc-row">
            <span class="acc-label">Reducir animaciones</span>
            <button (click)="toggleReducedMotion()" [class.active]="isReducedMotion" type="button" class="acc-btn acc-btn--toggle">
              {{ isReducedMotion ? 'Desactivar' : 'Activar' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Theme -->
    <button
      class="admin-icon-btn"
      type="button"
      (click)="onToggleTheme()"
      [attr.aria-label]="isDarkMode ? 'Modo claro' : 'Modo oscuro'"
      [attr.title]="isDarkMode ? 'Modo claro' : 'Modo oscuro'"
    >
      <svg *ngIf="!isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg *ngIf="isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- Perfil -->
    <div class="user-chip" aria-label="Usuario actual">
      <div class="user-avatar" aria-hidden="true">
        <img *ngIf="avatarUrl" [src]="avatarUrl" alt="" class="user-avatar-img" />
        <span *ngIf="!avatarUrl">{{ userDisplay?.trim()?.charAt(0)?.toUpperCase() || 'U' }}</span>
      </div>
      <div class="user-meta">
        <span class="user-greeting">Administrador</span>
        <span class="user-name">{{ userDisplay }}</span>
      </div>
    </div>

    <!-- Logout -->
    <button
      class="admin-logout"
      type="button"
      (click)="onLogout()"
      aria-label="Cerrar sesión"
      title="Cerrar sesión"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- Accesibilidad backdrop -->
<div class="acc-backdrop" *ngIf="accOpen" (click)="accOpen = false"></div>
