<header class="admin-navbar">
  <div class="navbar-left">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>

      <input
        class="admin-search"
        type="text"
        placeholder="Buscar en todo el sistema..."
        aria-label="Buscar en todo el sistema"
      />
    </div>
  </div>

  <div class="admin-user-info">
    <div class="user-chip" aria-label="Usuario actual">
      <div class="user-avatar" aria-hidden="true">
        {{ userDisplay?.trim()?.charAt(0)?.toUpperCase() || 'U' }}
      </div>

      <div class="user-meta">
        <span class="user-greeting">Administrador</span>
        <span class="user-name">{{ userDisplay }}</span>
      </div>
    </div>

    <button
      class="admin-theme-toggle"
      type="button"
      (click)="onToggleTheme()"
      [attr.aria-label]="isDarkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      [attr.title]="isDarkMode ? 'Modo claro' : 'Modo oscuro'">
      <svg *ngIf="!isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>

      <svg *ngIf="isDarkMode" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <button
      class="admin-logout"
      type="button"
      (click)="onLogout()"
      aria-label="Cerrar sesión">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Cerrar sesión</span>
    </button>
  </div>
</header>
