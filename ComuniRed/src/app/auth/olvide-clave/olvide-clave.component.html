<div class="olvide-container">
  <div class="olvide-card">
    <h2>Recuperar contraseña</h2>

    <p *ngIf="pasoActual === 1">
      Ingresa tu correo para enviarte un código de verificación.
    </p>
    <p *ngIf="pasoActual === 2">
      Revisa tu correo e ingresa el código que te enviamos.
    </p>
    <p *ngIf="pasoActual === 3">
      Crea tu nueva contraseña.
    </p>

    <!-- Paso 1 -->
    <form
      *ngIf="pasoActual === 1"
      #formCorreo="ngForm"
      (ngSubmit)="enviarCodigo(formCorreo)"
      autocomplete="off"
    >
      <label for="correo">Correo electrónico</label>
      <input
        type="email"
        id="correo"
        name="correo"
        [(ngModel)]="correo"
        required
        [disabled]="isLoading"
        placeholder="correo@ejemplo.com"
        autocomplete="off"
      />

      <button type="submit" [disabled]="formCorreo.invalid || isLoading">
        {{ isLoading ? 'Enviando...' : 'Enviar código' }}
      </button>

      <div class="volver">
        <a routerLink="/login">← Volver al inicio de sesión</a>
      </div>
    </form>

    <!-- Paso 2 -->
    <form
      *ngIf="pasoActual === 2"
      #formCodigo="ngForm"
      (ngSubmit)="verificarCodigo(formCodigo)"
      autocomplete="off"
    >
      <label for="codigo">Código recibido</label>
      <input
        type="text"
        id="codigo"
        name="codigo"
        [(ngModel)]="codigo"
        required
        maxlength="6"
        [disabled]="isLoading"
        placeholder="123456"
        autocomplete="off"
      />

      <button type="submit" [disabled]="formCodigo.invalid || isLoading">
        {{ isLoading ? 'Verificando...' : 'Verificar código' }}
      </button>

      <div class="volver">
        <a role="button" tabindex="0" (click)="volverPaso(1)">← Volver</a>
      </div>
    </form>

    <!-- Paso 3 -->
    <form
      *ngIf="pasoActual === 3"
      #formClave="ngForm"
      (ngSubmit)="cambiarClave(formClave)"
      autocomplete="off"
    >
      <label for="nuevaClave">Nueva contraseña</label>
      <input
        type="password"
        id="nuevaClave"
        name="nuevaClave"
        [(ngModel)]="nuevaClave"
        required
        minlength="6"
        [disabled]="isLoading"
        placeholder="Mínimo 6 caracteres"
        autocomplete="new-password"
      />

      <label for="confirmarClave">Confirmar contraseña</label>
      <input
        type="password"
        id="confirmarClave"
        name="confirmarClave"
        [(ngModel)]="confirmarClave"
        required
        minlength="6"
        [disabled]="isLoading"
        placeholder="Repite tu contraseña"
        autocomplete="new-password"
      />

      <button type="submit" [disabled]="formClave.invalid || isLoading">
        {{ isLoading ? 'Guardando...' : 'Cambiar contraseña' }}
      </button>

      <div class="volver">
        <a role="button" tabindex="0" (click)="volverPaso(2)">← Volver</a>
      </div>
    </form>

    <div class="mensaje-exito" *ngIf="mensaje">
      {{ mensaje }}
    </div>

    <div class="mensaje-error" *ngIf="error">
      {{ error }}
    </div>
  </div>
</div>
