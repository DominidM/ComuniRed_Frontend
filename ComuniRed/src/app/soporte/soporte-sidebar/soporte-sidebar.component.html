<div class="sidebar-container">
  <nav class="sidebar-menu">
    <a 
      *ngFor="let item of menuItems" 
      [routerLink]="item.route"
      routerLinkActive="active"
      class="sidebar-link"
    >
      <span class="icon-wrap">
        <i class="bi {{ item.icon }}"></i>
      </span>
      <span class="link-label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="perfil-header">
    <div class="perfil" (click)="onPerfilClick()">
      <img
        [src]="getImagenUrl(usuario?.foto_perfil)"
        alt="Foto de perfil"
        class="avatar"
      />
      <div class="user-info">
        <span class="nombre">{{ usuario?.nombre }} {{ usuario?.apellido }}</span>
        <span class="estado"><i class="bi bi-circle-fill online-dot"></i> En linea</span>
      </div>
    </div>

    <button class="logout-btn" (click)="onSalir()" aria-label="Cerrar sesion">
      <i class="bi bi-box-arrow-right"></i>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</div>
