<div class="toast-stack" *ngIf="alerts.length > 0">
  <div class="toast" *ngFor="let alert of alerts" [ngClass]="'toast-' + alert.type">
    <span class="toast-icon material-icons">
      {{
        alert.type === 'success' ? 'check_circle' :
        alert.type === 'error' ? 'error' :
        alert.type === 'warning' ? 'warning' : 'info'
      }}
    </span>

    <div class="toast-body">
      <p class="toast-message">{{ alert.message }}</p>
    </div>

    <button type="button" class="toast-close" (click)="onRemoveAlert(alert)">×</button>
  </div>
</div>

<div class="confirm-overlay" *ngIf="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-icon">
      <span class="material-icons">warning_amber</span>
    </div>

    <h3 class="confirm-title">{{ confirmDialog.title }}</h3>
    <p class="confirm-message">{{ confirmDialog.message }}</p>

    <div class="confirm-actions">
      <button type="button" class="confirm-btn confirm-btn-cancel" (click)="onCancel()">
        {{ confirmDialog.cancelText || 'Cancelar' }}
      </button>
      <button type="button" class="confirm-btn confirm-btn-ok" (click)="onConfirm()">
        {{ confirmDialog.confirmText || 'Confirmar' }}
      </button>
    </div>
  </div>
</div>
