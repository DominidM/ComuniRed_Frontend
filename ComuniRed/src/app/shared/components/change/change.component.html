<!-- ===== TOASTS ===== -->
<div class="toast-stack" *ngIf="alerts.length > 0">
  <div
    *ngFor="let alert of alerts"
    class="toast"
    [class.toast-success]="alert.type === 'success'"
    [class.toast-error]="alert.type === 'error'"
    [class.toast-warning]="alert.type === 'warning'"
    [class.toast-info]="alert.type === 'info'"
  >
    <span class="toast-icon">
      <i
        class="bi"
        [class.bi-check-circle-fill]="alert.type === 'success'"
        [class.bi-x-circle-fill]="alert.type === 'error'"
        [class.bi-exclamation-triangle-fill]="alert.type === 'warning'"
        [class.bi-info-circle-fill]="alert.type === 'info' || !alert.type"
      ></i>
    </span>
    <span class="toast-message">{{ alert.message }}</span>
    <button class="toast-close" (click)="remove(alert)">
      <i class="bi bi-x"></i>
    </button>
  </div>
</div>

<!-- ===== CONFIRM DIALOG ===== -->
<div class="confirm-overlay" *ngIf="confirmDialog" (click)="onCancel()">
  <div class="confirm-box" (click)="$event.stopPropagation()">
    <div class="confirm-icon">
      <i class="bi bi-exclamation-triangle"></i>
    </div>
    <h3 class="confirm-title">{{ confirmDialog.title }}</h3>
    <p class="confirm-message">{{ confirmDialog.message }}</p>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" (click)="onCancel()">
        Cancelar
      </button>
      <button class="confirm-btn confirm-btn-ok" (click)="onConfirm()">
        Confirmar
      </button>
    </div>
  </div>
</div>
